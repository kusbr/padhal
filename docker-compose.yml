services:
  redis:
    image: redis:7-alpine
    container_name: padhal-redis
    ports:
      - "6379:6379"

  api:
    image: kumsub/padhal-api:${PADHAL_API_TAG:-replace-me}
    pull_policy: always
    container_name: padhal-api
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    image: kumsub/padhal-frontend:${PADHAL_FRONTEND_TAG:-replace-me}
    pull_policy: always
    container_name: padhal-frontend
    ports:
      - "8080:80"
    depends_on:
      - api
