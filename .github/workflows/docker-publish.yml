name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: kumsub/padhal-api
            dockerfile: docker/Dockerfile.api
          - image_name: kumsub/padhal-frontend
            dockerfile: docker/Dockerfile.frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image_name }}
          tags: |
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart with commit SHA image tag
        run: |
          helm lint ./helm/padhal \
            --set global.imageTag=${GITHUB_SHA}

      - name: Package chart with commit SHA appVersion
        run: |
          mkdir -p dist
          helm package ./helm/padhal \
            --app-version "${GITHUB_SHA}" \
            --destination dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: padhal-helm-chart
          path: dist/*.tgz
