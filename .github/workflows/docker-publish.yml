name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      ACR_NAME: ${{ secrets.AZURE_ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ secrets.AZURE_ACR_NAME }}.azurecr.io
      AZURE_CREDENTIALS_JSON: ${{ secrets.AZURE_CREDENTIALS }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerhub_image: kumsub/padhal-api
            acr_repository: padhal-api
            dockerfile: docker/Dockerfile.api
          - dockerhub_image: kumsub/padhal-frontend
            acr_repository: padhal-frontend
            dockerfile: docker/Dockerfile.frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Azure login for ACR
        if: ${{ env.AZURE_CREDENTIALS_JSON != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ env.AZURE_CREDENTIALS_JSON }}

      - name: Azure login for ACR (OIDC / service principal fields)
        if: ${{ env.AZURE_CREDENTIALS_JSON == '' && env.AZURE_CLIENT_SECRET != '' }}
        uses: azure/login@v2
        with:
          creds: >-
            {"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}

      - name: Azure login for ACR (OIDC)
        if: ${{ env.AZURE_CREDENTIALS_JSON == '' && env.AZURE_CLIENT_SECRET == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${ACR_NAME}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ matrix.dockerhub_image }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ matrix.acr_repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart with commit SHA image tag
        run: |
          helm lint ./helm/padhal \
            --set global.imageTag=${GITHUB_SHA}

      - name: Package chart with commit SHA appVersion
        run: |
          mkdir -p dist
          helm package ./helm/padhal \
            --app-version "${GITHUB_SHA}" \
            --destination dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: padhal-helm-chart
          path: dist/*.tgz
