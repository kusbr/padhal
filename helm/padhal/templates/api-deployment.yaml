apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "padhal.apiName" . }}
  labels:
    {{- include "padhal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "padhal.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "padhal.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: padhal-api
          image: "{{ .Values.api.image.repository }}:{{ include "padhal.imageTag" (dict "root" . "component" .Values.api) }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: REDIS_URL
              value: redis://{{ include "padhal.redisName" . }}:{{ .Values.redis.service.port }}/0
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
